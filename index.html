<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order summary component</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="card1">
            <img src="illustration-hero.svg" alt="">
        </div>
        <div class="card2">
            <div id="box1">Order Summary
                <p>You can now listen to million of songs, audiobooks, and podcasts on any device anywhere you like!</p>
            </div>
            <div id="box2">
                <div class="bot1">
                    <img src="icon-music.svg" alt="">
                </div>
                <div class="bot2">
                    <span>Annual Plan </span> <span id="price">$59.99/year</span>
                </div>
                <div class="bot3">
                    <a href="#">Change</a>
                </div>
            </div>
            <div id="box3">
                <button class="btn">Proceed to Payment</button>
                <p>Cancel Order</p>
            </div>
        </div>
    </div>
</body>

</html>
